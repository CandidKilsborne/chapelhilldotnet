<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Chapel Hill .NET logo mark</title>
  <desc id="desc">A blue to teal rounded-square logo with code brackets, a hill line, and a warm sun accent.</desc>
  <defs>
    <linearGradient id="bg" x1="26" y1="18" x2="136" y2="144" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2453a6" />
      <stop offset="0.58" stop-color="#13608b" />
      <stop offset="1" stop-color="#0b766a" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(50 34) rotate(38) scale(92 68)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.34" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="hill" x1="42" y1="109" x2="118" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f6c36f" />
      <stop offset="1" stop-color="#ffe2b8" />
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0d1f3e" flood-opacity="0.22" />
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <rect x="12" y="12" width="136" height="136" rx="34" fill="url(#bg)" />
    <rect x="12" y="12" width="136" height="136" rx="34" fill="url(#glow)" />
    <rect x="12.75" y="12.75" width="134.5" height="134.5" rx="33.25" fill="none" stroke="#ffffff" stroke-opacity="0.26" />

    <circle cx="110" cy="48" r="10" fill="#efb356" />
    <circle cx="110" cy="48" r="15" fill="#efb356" opacity="0.18" />

    <path d="M60 52L40 80L60 108" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M100 52L120 80L100 108" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" />

    <path d="M42 104C53 94 63 90 74 94C82 97 90 105 98 106C106 107 114 103 118 98" fill="none" stroke="url(#hill)" stroke-width="8" stroke-linecap="round" />
    <circle cx="78" cy="95" r="4.5" fill="#fff7ea" />
  </g>
</svg>
