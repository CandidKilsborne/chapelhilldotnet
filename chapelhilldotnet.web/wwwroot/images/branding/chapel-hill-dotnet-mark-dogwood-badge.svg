    <circle cx="80" cy="80" r="63" fill="none" stroke="#ffffff" stroke-opacity="0.24" />
    <circle cx="80" cy="80" r="48" fill="none" stroke="#ffffff" stroke-opacity="0.1" />

    <path d="M58 63L45 80L58 97" fill="none" stroke="#8cb8ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M102 63L115 80L102 97" fill="none" stroke="#8cb8ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

    <g transform="translate(80 80)">
      <path d="M0-23C-7-32-18-32-21-22C-24-11-16-3 0 5C16-3 24-11 21-22C18-32 7-32 0-23Z" fill="#fff9ee" />
      <path d="M23 0C32-7 32-18 22-21C11-24 3-16-5 0C3 16 11 24 22 21C32 18 32 7 23 0Z" fill="#fff9ee" />
      <path d="M0 23C7 32 18 32 21 22C24 11 16 3 0-5C-16 3-24 11-21 22C-18 32-7 32 0 23Z" fill="#fff9ee" />
      <path d="M-23 0C-32 7-32 18-22 21C-11 24-3 16 5 0C-3-16-11-24-22-21C-32-18-32-7-23 0Z" fill="#fff9ee" />
      <circle cx="0" cy="0" r="8" fill="#e5b264" />
