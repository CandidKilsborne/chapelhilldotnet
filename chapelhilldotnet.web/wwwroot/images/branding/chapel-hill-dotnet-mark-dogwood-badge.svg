<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-labelledby="title desc">
  <title id="title">Chapel Hill .NET dogwood badge logo</title>
  <desc id="desc">A circular badge logo with a dogwood flower, code brackets, and warm North Carolina-inspired colors.</desc>
  <defs>
    <linearGradient id="badge-ring" x1="28" y1="28" x2="132" y2="132" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d4e9d" />
      <stop offset="0.55" stop-color="#2453a6" />
      <stop offset="1" stop-color="#0b766a" />
    </linearGradient>
    <radialGradient id="badge-center" cx="0" cy="0" r="1" gradientTransform="translate(80 78) rotate(90) scale(56)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16376e" />
      <stop offset="1" stop-color="#0d274d" />
    </radialGradient>
    <filter id="badge-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#102444" flood-opacity="0.22" />
    </filter>
  </defs>

  <g filter="url(#badge-shadow)">
